# Synthea configuration for medical billing dataset generation
exporter.csv.export = true
exporter.fhir.export = false
exporter.ccda.export = false
exporter.text.export = false
exporter.hospital.fhir.export = false
exporter.practitioner.fhir.export = false

# Generate enough data for a useful ML dataset
generate.default_population = 200

# US state — Florida (PI cases common)
generate.geography.state = Florida
generate.geography.city = Miami

# Ensure insurance/billing data is generated
generate.payers.insurance_companies.default_file = payers/insurance_companies.csv
